name: Deploy to AWS Lightsail

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-lightsail-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy frontend & backend
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to Lightsail via SSH
        env:
          SSH_HOST: ${{ secrets.HOST }}
          SSH_USER: ${{ secrets.USERNAME }}
          VITE_API_URL: /api
          VITE_CRM_URL: https://crm.pydah.edu.in
        run: |
          ssh -o StrictHostKeyChecking=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=10 \
              -o ConnectTimeout=30 \
              "${SSH_USER}@${SSH_HOST}" \
              "export VITE_API_URL='${VITE_API_URL}'; export VITE_CRM_URL='${VITE_CRM_URL}'; bash -s" \
              < .github/scripts/deploy-remote.sh
